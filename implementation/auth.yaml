AWSTemplateFormatVersion: '2010-09-09'
Description: AuthStack — Cognito User Pool with tenant-ID custom attribute, MFA enforced

Parameters:
  ClientName:
    Type: String

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${ClientName}-tenant-pool
      MfaConfiguration: 'ON'
      EnabledMfas: [SOFTWARE_TOKEN_MFA]
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
      Schema:
        - {Name: tenant_id, AttributeDataType: String, Mutable: false}
        - {Name: subscription_tier, AttributeDataType: String, Mutable: true}
      AutoVerifiedAttributes: [email]
      UserPoolTags:
        Project: !Sub ${ClientName}-copilot

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub ${ClientName}-copilot-client
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows: [ALLOW_USER_SRP_AUTH, ALLOW_REFRESH_TOKEN_AUTH]
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 1
      TokenValidityUnits: {AccessToken: hours, IdToken: hours, RefreshToken: days}
      PreventUserExistenceErrors: ENABLED

Outputs:
  UserPoolId:
    Value: !Ref UserPool
  UserPoolArn:
    Value: !GetAtt UserPool.Arn
  AppClientId:
    Value: !Ref UserPoolClient
